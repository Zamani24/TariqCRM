// Track when contact entered current stage
function recordStageEntry(oldContact, patch) {
  if (patch.stage && patch.stage !== oldContact.stage) {
    patch.stageEnteredDate = today();
  }
  return patch;
}

// Days stuck in current stage
function daysInStage(c) {
  if (!c.stageEnteredDate) return null;
  return Math.floor((Date.now() - new Date(c.stageEnteredDate).getTime()) / 86400000);
}

// Pipeline coverage: pipeline value vs monthly quota target
function pipelineCoverage() {
  var pipe = G.contacts.filter(function(c) {
    return !["Closed Won","Closed Lost"].includes(c.stage);
  }).reduce(function(s,c) { return s + (parseFloat(c.value)||0); }, 0);
  var target = G.quota.monthlyTarget || 10000;
  return {pipe: pipe, target: target, ratio: target > 0 ? pipe/target : 0};
}

// Win/loss reasons aggregated
function getWinLossStats() {
  var reasons = {won:{}, lost:{}};
  G.contacts.forEach(function(c) {
    if (c.stage === "Closed Won" && c.closeReason) {
      reasons.won[c.closeReason] = (reasons.won[c.closeReason]||0)+1;
    }
    if (c.stage === "Closed Lost" && c.closeReason) {
      reasons.lost[c.closeReason] = (reasons.lost[c.closeReason]||0)+1;
    }
  });
  return reasons;
}

// BANT score: 0-4 based on what's confirmed
function bantScore(c) {
  var score = 0;
  if (c.bantBudget === "confirmed") score++;
  if (c.bantAuthority === "decision_maker") score++;
  if (c.bantNeed === "strong") score++;
  if (c.bantTimeline === "this_quarter") score++;
  return score;
}

// Deal health score: composite of BANT + engagement + velocity
function dealHealth(c) {
  if (["Closed Won","Closed Lost"].includes(c.stage)) return null;
  var score = 0; var max = 10;
  // BANT completeness (4 pts)
  score += bantScore(c);
  // Has inbound reply (1 pt)
  if ((c.emails||[]).some(function(e){ return e.direction==="in"; })) score++;
  // Has a call logged (1 pt)
  if ((c.calls||[]).length > 0) score++;
  // Not stale (2 pts)
  var d = daysAgo(c.lastContact);
  if (d !== null && d < 7) score += 2;
  else if (d !== null && d < 14) score++;
  // Stage velocity ok (2 pts)
  var dis = daysInStage(c);
  if (dis !== null && dis < 14) score += 2;
  else if (dis !== null && dis < 21) score++;
  return Math.round((score/max)*100);
}


// ICP Fit Score (0-100): how well contact matches ideal customer profile
function icpScore(c) {
  var score = 0;
  var icp = G.icpConfig || {industries:[], titles:[], minDeal:5000, maxDeal:50000};
  // Industry match
  if (icp.industries && icp.industries.length > 0) {
    if (c.industry && icp.industries.some(function(i){ return c.industry.toLowerCase().includes(i.toLowerCase()); })) score += 30;
  } else { score += 15; }
  // Title match (decision-maker signals)
  var dmTitles = ['vp','director','head','chief','cco','cro','cso','cmo','ceo','founder','owner','president'];
  if (c.title) {
    var titleLower = c.title.toLowerCase();
    if (dmTitles.some(function(t){ return titleLower.includes(t); })) score += 25;
    else if (titleLower.includes('manager') || titleLower.includes('lead')) score += 10;
  }
  // Custom title match from ICP config
  if (icp.titles && icp.titles.length > 0 && c.title) {
    if (icp.titles.some(function(t){ return c.title.toLowerCase().includes(t.toLowerCase()); })) score += 20;
  }
  // Deal value in range
  var val = parseFloat(c.value) || 0;
  if (val >= (icp.minDeal||0) && val <= (icp.maxDeal||999999)) score += 25;
  else if (val > 0) score += 10;
  return Math.min(100, score);
}

// Get ICP color
function icpColor(score) {
  if (score >= 70) return "#34d399";
  if (score >= 40) return "#f5a623";
  return "#f87171";
}

// Auto-score: calculate based on activity signals
function autoScore(c) {
  if (["Closed Won","Closed Lost"].includes(c.stage)) return c.score || 0;
  var score = 0;
  var d = daysAgo(c.lastContact);
  var inboundEmails = (c.emails||[]).filter(function(e){ return e.direction==="in"; }).length;
  var meetings = (c.meetings||[]).length;
  var calls = (c.calls||[]).filter(function(l){ return l.sentiment==="positive"; }).length;
  var stageIdx = STAGES.indexOf(c.stage);
  // Stage-based baseline
  if (stageIdx >= 3) score += 2; // Meeting Set or beyond
  else if (stageIdx >= 2) score += 1; // Replied
  // Engagement signals
  if (inboundEmails > 0) score += 1;
  if (meetings > 0) score += 1;
  if (calls > 0) score += 1;
  // Recency penalty
  if (d !== null && d > 14) score = Math.max(0, score - 1);
  if (d === null) score = 0;
  return Math.min(3, score);
}

// Duplicate detection: returns array of {contact, matchType} for suspected dupes
function findDupes(contacts, newEmail, newCompany, newName) {
  var dupes = [];
  contacts.forEach(function(c) {
    if (newEmail && c.email && c.email.toLowerCase() === newEmail.toLowerCase()) {
      dupes.push({c:c, reason:"Same email address"});
    } else if (newName && c.name && c.name.toLowerCase() === newName.toLowerCase() && newCompany && c.company && c.company.toLowerCase() === newCompany.toLowerCase()) {
      dupes.push({c:c, reason:"Same name and company"});
    }
  });
  return dupes;
}

async function init() {
  // Try to load from server first (persists across browser clears)
  var serverData = null;
  try {
    var resp = await fetch("/api/sync");
    if (resp.ok) {
      var d = await resp.json();
      if (d.contacts && d.contacts.length > 0) serverData = d;
    }
  } catch(e) { /* server not running — fall back to localStorage */ }

  if (serverData) {
    G.contacts = serverData.contacts;
    if (serverData.quota) G.quota = serverData.quota;
    if (serverData.icpConfig) G.icpConfig = serverData.icpConfig;
  } else {
    var saved = dbLoad();
    if (saved && saved.contacts && saved.contacts.length > 0) {
      G.contacts = saved.contacts;
      if (saved.quota) G.quota = saved.quota;
    } else {
      G.contacts = JSON.parse(JSON.stringify(SEED));
    }
  }
  // Auto-score all contacts on load
  G.contacts = G.contacts.map(function(c) { return Object.assign({}, c, {score: autoScore(c)}); });
  render();
}

function persist() {
  // Refresh auto-scores before saving
  G.contacts = G.contacts.map(function(c) { return Object.assign({}, c, {score: autoScore(c)}); });
  dbSave({contacts:G.contacts, quota:G.quota});
  syncToServer();
}

function updateContact(id, patch) {
  G.contacts = G.contacts.map(function(c) {
    if (c.id === id) {
      patch = recordStageEntry(c, patch);
      return Object.assign({}, c, patch);
    }
    return c;
  });
  if (G.selId === id && G.draft) {
    G.draft = Object.assign({}, G.draft, patch);
  }
  persist();
  render();
}

function deleteContact(id) {
  G.contacts = G.contacts.filter(function(c) { return c.id !== id; });
  G.selId = null;
  persist();
  render();
}

function getSelected() {
  return G.selId ? G.contacts.find(function(c) { return c.id === G.selId; }) : null;
}

function getPending() {
  return G.contacts.flatMap(function(c) {
    return (c.tasks || []).map(function(t) {
      return Object.assign({}, t, {cName: c.name, cId: c.id});
    });
  }).filter(function(t) { return !t.done; }).sort(function(a,b) {
    return new Date(a.due) - new Date(b.due);
  });
}

function getStats() {
  var won = G.contacts.filter(function(c) { return c.stage === "Closed Won"; });
  var lost = G.contacts.filter(function(c) { return c.stage === "Closed Lost"; });
  var pipe = G.contacts.filter(function(c) { return !["Closed Won","Closed Lost"].includes(c.stage); });
  var wkAgo = new Date(); wkAgo.setDate(wkAgo.getDate() - 7);
  var ws = wkAgo.toISOString().split("T")[0];
  return {
    pipe: pipe.length,
    won: won.length,
    val: won.reduce(function(s,c) { return s + (parseFloat(c.value)||0); }, 0),
    pipeVal: pipe.reduce(function(s,c) { return s + (parseFloat(c.value)||0); }, 0),
    tasks: getPending().length,
    hot: G.contacts.filter(function(c) { return c.score >= 2 && !["Closed Won","Closed Lost"].includes(c.stage); }).length,
    winRate: (won.length + lost.length) > 0 ? Math.round(won.length / (won.length + lost.length) * 100) : 0,
    avgDeal: won.length > 0 ? Math.round(won.reduce(function(s,c) { return s+(parseFloat(c.value)||0); }, 0) / won.length) : 0,
    emails: G.contacts.flatMap(function(c) { return c.emails||[]; }).filter(function(e) { return e.direction==="out" && e.date>=ws; }).length,
    calls: G.contacts.flatMap(function(c) { return c.calls||[]; }).filter(function(l) { return l.date>=ws; }).length,
    meetings: G.contacts.flatMap(function(c) { return c.meetings||[]; }).filter(function(m) { return m.date>=ws; }).length
  };
}

async function callAI(sys, usr, tok) {
  tok = tok || 700;
  var resp = await fetch("/api/ai", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:tok, system:sys, messages:[{role:"user",content:usr}]})
  });
  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    throw new Error(err.error || "AI request failed (" + resp.status + ")");
  }
  var data = await resp.json();
  var content = data.content && data.content.find(function(b) { return b.type === "text"; });
  return (content ? content.text : "").replace(/```json|```/g, "").trim();
}

// DOM helpers
function el(tag, props) {
  var e = document.createElement(tag);
  if (!props) return e;
  Object.keys(props).forEach(function(k) {
    if (k === "style") { Object.assign(e.style, props[k]); }
    else if (k === "cls") { e.className = props[k]; }
    else if (k === "on") { Object.keys(props[k]).forEach(function(ev) { e.addEventListener(ev, props[k][ev]); }); }
    else if (k === "text") { e.textContent = props[k]; }
    else { e[k] = props[k]; }
  });
  return e;
}

function div(style) {
  var e = document.createElement("div");
  if (typeof style === "object") Object.assign(e.style, style);
  for (var i = 1; i < arguments.length; i++) {
    var c = arguments[i];
    if (c == null) continue;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) e.appendChild(c);
  }
  return e;
}

function mkBtn(text, onClick, style) {
  var b = el("button", {text: text, on: {click: onClick}});
  if (style) Object.assign(b.style, style);
  return b;
}

function mkInput(val, onChange, style, type) {
  var i = el("input", {type: type || "text"});
  Object.assign(i.style, {background:"#13131a",border:"1px solid #1e1e2a",borderRadius:"6px",padding:"7px 9px",color:"#e8e8f0",fontSize:"12px",outline:"none",width:"100%"});
  if (style) Object.assign(i.style, style);
  i.value = val || "";
  i.addEventListener("input", function(e) { onChange(e.target.value); });
  return i;
}

function mkSelect(val, options, onChange, style) {
  var s = el("select");
  Object.assign(s.style, {background:"#13131a",border:"1px solid #1e1e2a",borderRadius:"6px",padding:"7px 9px",color:"#e8e8f0",fontSize:"12px",outline:"none",width:"100%"});
  if (style) Object.assign(s.style, style);
  options.forEach(function(opt) {
    var pair = Array.isArray(opt) ? opt : [opt, opt];
    var o = el("option", {text: String(pair[1]), value: String(pair[0])});
    if (String(pair[0]) === String(val)) o.selected = true;
    s.appendChild(o);
  });
  s.addEventListener("change", function(e) { onChange(e.target.value); });
  return s;
}

function mkTextarea(val, onChange, style) {

}

  w.appendChild(top);

  track.appendChild(div({height:"100%",width:pct+"%",background:val>=target?"#34d399":color,borderRadius:"2px"}));
  w.appendChild(track);
  return w;
}

  });
  pend.filter(function(t) { return t.due === td2; }).forEach(function(t) {

    if (c) sigs.push({p:2,col:"#f5a623",c:c,txt:"Due today: " + t.text,sub:c.name,tag:"TODAY"});
  });
  cx.filter(function(c) { return !["Closed Won","Closed Lost"].includes(c.stage); }).forEach(function(c) {
    var d = daysAgo(c.lastContact), thr = c.score >= 2 ? 5 : 10;
    if (d === null || d >= thr) sigs.push({p:c.score>=2?2:3,col:SCORE_COLOR[c.score||0],c:c,txt:SCORE_LABEL[c.score||0] + " lead " + (d===null?"never contacted":d+"d silent"),sub:c.name + " - " + c.stage,tag:SCORE_LABEL[c.score||0].toUpperCase()});

    var cols = G.contacts.filter(function(c) { return c.stage === stage; });

      ct.appendChild(nd); card.appendChild(ct);

      if (c.nextStep) card.appendChild(div({fontSize:"8px",color:"#4a9eff",background:"rgba(74,158,255,0.08)",padding:"2px 5px",borderRadius:"4px",marginBottom:"4px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}, "-> " + c.nextStep));
      var tags = div({display:"flex",gap:"3px",flexWrap:"wrap"});

      var pt = (c.tasks||[]).filter(function(t) { return !t.done; }).length;

  ctrl.appendChild(mkSelect("score", [["score","By Score"],["value","By Value"],["recent","By Recent"]], function(v) { sortV = v; rebuild(); }, {width:"auto",padding:"7px 9px"}));
  ctrl.appendChild(mkSelect("all", [["all","All stages"]].concat(STAGES.map(function(s) { return [s, s]; })), function(v) { filterV = v; rebuild(); }, {width:"auto",padding:"7px 9px"}));

    hd.appendChild(div({fontSize:"9px",color:"#555",fontWeight:"700",letterSpacing:"0.07em",textTransform:"uppercase"}, h));
  });
  tw.appendChild(hd);
  var tbody = div({});
  tw.appendChild(tbody); w.appendChild(tw);

  function rebuild() {
    tbody.innerHTML = "";
    var f = G.contacts.filter(function(c) {
      return [c.name,c.company,c.email,c.title].some(function(v) { return v && v.toLowerCase().includes(searchV.toLowerCase()); });
    });
    if (filterV !== "all") f = f.filter(function(c) { return c.stage === filterV; });
    f.sort(function(a,b) {
      if (sortV === "score") return b.score - a.score;

      return new Date(b.lastContact||0) - new Date(a.lastContact||0);

    f.forEach(function(c) {
      var sc = COLORS[c.stage], d = daysAgo(c.lastContact);

// ================================================================
function buildCallQueue() {
  return G.contacts
    .filter(function(c) { return !["Closed Won","Closed Lost"].includes(c.stage); })
    .map(function(c) {
      var d = daysAgo(c.lastContact);
      var priority = 0;
      if (c.score >= 3) priority = 4;
      else if (c.score >= 2) priority = 3;
      else if (d === null) priority = 2;
      else if (d >= 7) priority = 2;
      else priority = 1;
      return Object.assign({}, c, {_d: d, _priority: priority});
    })
    .sort(function(a,b) {
      if (b._priority !== a._priority) return b._priority - a._priority;
      var da = a._d === null ? 9999 : a._d;
      var db = b._d === null ? 9999 : b._d;
      return db - da;
    });
}

function renderCallQueue() {
  var queue = buildCallQueue();
  var w = div({maxWidth:"640px"});

  // ── POWER DIALER MODE ──
  if (G.dialerActive && G.dialerSession) {
    var sessionIds = G.dialerSession;
    var idx = G.dialerIdx;
    if (idx >= sessionIds.length) {
      // Session complete
      var done = div({background:"#0e0f14",border:"1px solid #1a1a24",borderRadius:"12px",padding:"32px",textAlign:"center"});

function renderCallSummaryTab(c) {
  var w = div({});
  var bn = div({background:"linear-gradient(135deg,rgba(167,139,250,0.1),rgba(52,211,153,0.06))",border:"1px solid rgba(167,139,250,0.2)",borderRadius:"9px",padding:"9px 11px",marginBottom:"11px"});

  w.appendChild(bn);

  w.appendChild(div({fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:"700",marginBottom:"5px"}, "Paste call notes"));

  w.appendChild(notesInput);
  w.appendChild(div({height:"8px"}));

  var analyseBtn = mkBtn("Analyse Call Notes", null, {padding:"9px",borderRadius:"8px",background:"linear-gradient(135deg,#a78bfa,#4a9eff)",border:"none",color:"#fff",fontSize:"12px",fontWeight:"700",width:"100%"});
  analyseBtn.addEventListener("click", function() {
    var notes = notesInput.value.trim();
    if (!notes) return;
    analyseBtn.textContent = "Analysing..."; analyseBtn.disabled = true;
    callAI(
      "You are a sales intelligence assistant. Analyse call notes and extract structured data. Return ONLY JSON with these exact fields: {\"summary\":\"2-3 sentence summary\",\"painPoints\":[\"...\"],\"objections\":[\"...\"],\"nextAction\":\"single most important next step\",\"budget\":\"budget info or empty string\",\"timeline\":\"timeline info or empty string\",\"sentiment\":\"positive or neutral or negative\",\"suggestedScore\":0}. suggestedScore 0-3 where 3=urgent/hot prospect.",
      "Contact: " + c.name + ", " + c.title + " at " + c.company + "\nStage: " + c.stage + "\nCall notes:\n" + notes,
      600
    ).then(function(txt) {
      var parsed = JSON.parse(txt);

      var result = div({background:"#13131a",border:"1px solid rgba(167,139,250,0.25)",borderRadius:"10px",overflow:"hidden",marginTop:"10px"});
      var rh = div({padding:"8px 11px",borderBottom:"1px solid #1e1e2a",display:"flex",alignItems:"center",justifyContent:"space-between"});

      var sentColor = parsed.sentiment==="positive"?"#34d399":parsed.sentiment==="negative"?"#f87171":"#f5a623";
      var sentBadge = div({fontSize:"9px",padding:"1px 7px",borderRadius:"100px",fontWeight:"700"}, parsed.sentiment||"neutral");
      sentBadge.style.color = sentColor; sentBadge.style.background = sentColor+"18";
      rh.appendChild(sentBadge); result.appendChild(rh);

      var body = div({padding:"10px 11px"});
      // Summary
      body.appendChild(div({fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700",marginBottom:"4px"}, "Summary"));
      body.appendChild(div({fontSize:"11px",color:"#ccc",lineHeight:"1.6",marginBottom:"10px"}, parsed.summary||""));

      // Pain points
      if (parsed.painPoints && parsed.painPoints.length) {
        body.appendChild(div({fontSize:"9px",color:"#f87171",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700",marginBottom:"4px"}, "Pain Points"));
        parsed.painPoints.forEach(function(p) {
          var row2 = div({display:"flex",gap:"7px",marginBottom:"3px",alignItems:"flex-start"});
          row2.appendChild(div({width:"4px",height:"4px",borderRadius:"50%",background:"#f87171",flexShrink:"0",marginTop:"5px"}));
          row2.appendChild(div({fontSize:"11px",color:"#aaa",lineHeight:"1.5"}, p));
          body.appendChild(row2);
        });
        body.appendChild(div({height:"8px"}));
      }

      // Objections
      if (parsed.objections && parsed.objections.length) {
        body.appendChild(div({fontSize:"9px",color:"#f5a623",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700",marginBottom:"4px"}, "Objections"));
        parsed.objections.forEach(function(o) {
          var row2 = div({display:"flex",gap:"7px",marginBottom:"3px",alignItems:"flex-start"});
          row2.appendChild(div({width:"4px",height:"4px",borderRadius:"50%",background:"#f5a623",flexShrink:"0",marginTop:"5px"}));
          row2.appendChild(div({fontSize:"11px",color:"#aaa",lineHeight:"1.5"}, o));
          body.appendChild(row2);
        });
        body.appendChild(div({height:"8px"}));
      }

      // Budget + Timeline
      if (parsed.budget || parsed.timeline) {
        var btRow = div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"});
        if (parsed.budget) {
          var bb = div({background:"#0e0f14",borderRadius:"7px",padding:"8px 10px"});
          bb.appendChild(div({fontSize:"9px",color:"#34d399",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"3px"}, "Budget"));
          bb.appendChild(div({fontSize:"11px",color:"#ccc"}, parsed.budget));
          btRow.appendChild(bb);
        }
        if (parsed.timeline) {
          var tb2 = div({background:"#0e0f14",borderRadius:"7px",padding:"8px 10px"});
          tb2.appendChild(div({fontSize:"9px",color:"#4a9eff",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"3px"}, "Timeline"));
          tb2.appendChild(div({fontSize:"11px",color:"#ccc"}, parsed.timeline));
          btRow.appendChild(tb2);
        }
        body.appendChild(btRow);
      }

      // Next action
      if (parsed.nextAction) {
        var na = div({background:"rgba(74,158,255,0.06)",border:"1px solid rgba(74,158,255,0.2)",borderRadius:"7px",padding:"8px 10px",marginBottom:"10px"});
        na.appendChild(div({fontSize:"9px",color:"#4a9eff",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"3px"}, "Recommended Next Action"));
        na.appendChild(div({fontSize:"11px",color:"#ccc",fontWeight:"600"}, parsed.nextAction));
        body.appendChild(na);
      }

      result.appendChild(body);

      // Apply to contact button
      var applyRow = div({padding:"8px 11px",borderTop:"1px solid #1e1e2a",display:"flex",gap:"6px"});
      var applyBtn = mkBtn("Apply to Contact", function() {
        var updates = {
          calls: (c.calls||[]).concat([{id:"l_"+Date.now(), date:today(), duration:"", notes:notes, sentiment:parsed.sentiment||"neutral", nextAction:parsed.nextAction||""}]),
          nextStep: parsed.nextAction || c.nextStep,
          lastContact: today()
        };
        // Add new objections detected
        if (parsed.objections && parsed.objections.length) {
          var existingObjs = c.objections || [];
          var existingTexts = existingObjs.map(function(o){ return o.text.toLowerCase(); });
          var newObjs = parsed.objections.filter(function(o){ return !existingTexts.includes(o.toLowerCase()); }).map(function(o){ return {id:"o_"+Date.now()+"_"+Math.random(), text:o, resolved:false}; });
          if (newObjs.length) updates.objections = existingObjs.concat(newObjs);
        }
        // Suggested score
        if (parsed.suggestedScore !== undefined) updates.score = Math.min(3, Math.max(0, parseInt(parsed.suggestedScore)||0));
        updateContact(c.id, updates);
        applyBtn.textContent = "Applied!"; applyBtn.disabled = true;
        G.tab = "calls";
        setTimeout(function(){ render(); }, 500);
      }, {padding:"7px",borderRadius:"7px",background:"linear-gradient(135deg,#4a9eff,#a78bfa)",border:"none",color:"#fff",fontSize:"11px",fontWeight:"700",flex:"1"});
      applyRow.appendChild(applyBtn);
      result.appendChild(applyRow);
      w.appendChild(result);
      analyseBtn.textContent = "Analyse Call Notes"; analyseBtn.disabled = false;
    }).catch(function() { analyseBtn.textContent = "Analyse Call Notes"; analyseBtn.disabled = false; });
  });
  w.appendChild(analyseBtn);
  return w;
}

// ================================================================
// MERGE VARIABLES
// ================================================================
function applyMergeVars(text, c) {
  if (!c) return text;
  var firstName = (c.name||"").split(" ")[0];
  return text
    .replace(/\{\{first_name\}\}/gi, firstName)
    .replace(/\{\{full_name\}\}/gi, c.name||"")
    .replace(/\{\{company\}\}/gi, c.company||"")
    .replace(/\{\{title\}\}/gi, c.title||"")
    .replace(/\{\{industry\}\}/gi, c.industry||"")
    .replace(/\{\{value\}\}/gi, fmtVal(c.value));
}

      focusBox.appendChild(div({fontSize:"9px",color:"#34d399",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"4px"}, "Today's Focus"));
      focusBox.appendChild(div({fontSize:"12px",color:"#e8e8f0",lineHeight:"1.6",fontWeight:"600"}, res.todaysFocus||""));
      rb.appendChild(focusBox);
      // Priority actions
      if (res.priorityActions && res.priorityActions.length) {
        rb.appendChild(div({fontSize:"9px",color:"#888",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"7px"}, "Priority Actions"));
        res.priorityActions.forEach(function(act, i) {
          var urgColor = act.urgency==="high"?"#f87171":act.urgency==="medium"?"#f5a623":"#4a9eff";
          var ar = div({background:"#13131a",border:"1px solid #1e1e2a",borderLeft:"3px solid "+urgColor,borderRadius:"8px",padding:"9px 11px",marginBottom:"5px",cursor:"pointer"});
          ar.className = "row-btn";
          var arTop = div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px",marginBottom:"3px"});
          arTop.appendChild(div({fontSize:"11px",fontWeight:"700"}, (i+1)+". "+act.contact));
          arTop.appendChild(div({fontSize:"8px",fontWeight:"700",color:urgColor,background:urgColor+"18",padding:"2px 7px",borderRadius:"100px",flexShrink:"0"}, (act.urgency||"medium").toUpperCase()));
          ar.appendChild(arTop);
          ar.appendChild(div({fontSize:"11px",color:"#ccc",marginBottom:"2px"}, act.action));
          ar.appendChild(div({fontSize:"10px",color:"#666"}, act.reason));
          // Click to navigate to contact
          ar.addEventListener("click", (function(name){ return function(){
            var found = G.contacts.find(function(c){ return c.name.toLowerCase().includes(name.toLowerCase()); });
            if (found) { G.selId=found.id; G.tab="coach"; render(); }
          }; })(act.contact));
          rb.appendChild(ar);
        });
        rb.appendChild(div({height:"8px"}));
      }
      // Pipeline health + risk + win opp
      var insightsGrid = div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"});
      [["Pipeline Health","#4a9eff",res.pipelineHealth],["Biggest Risk","#f87171",res.biggestRisk],["Win Opportunity","#34d399",res.winOpportunity]].filter(function(a){ return a[2]; }).forEach(function(a) {
        var ib = div({background:"#13131a",border:"1px solid #1e1e2a",borderRadius:"8px",padding:"9px 11px"});
        ib.appendChild(div({fontSize:"9px",color:a[1],fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"4px"}, a[0]));
        ib.appendChild(div({fontSize:"10px",color:"#aaa",lineHeight:"1.6"}, a[2]));
        insightsGrid.appendChild(ib);
      });
      rb.appendChild(insightsGrid);
      briefingResultArea.appendChild(rb);
      runBriefBtn.textContent = "Re-run Briefing"; runBriefBtn.disabled = false;
    }).catch(function(){ runBriefBtn.textContent = "Run Morning Briefing"; runBriefBtn.disabled = false; });
  });
  w.appendChild(briefingBox);

  // ── AGENT 2: Deal Risk Scanner ──
  var riskBox = div({background:"#0e0f14",border:"1px solid #1a1a24",borderRadius:"12px",overflow:"hidden",marginBottom:"12px"});
  var rh2 = div({padding:"13px 14px",borderBottom:"1px solid #1a1a24",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px"});
  var rhInfo = div({flex:"1"});
  var rhBadge = div({fontSize:"8px",fontWeight:"700",color:"#f87171",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",padding:"2px 8px",borderRadius:"100px",display:"inline-block",marginBottom:"6px"}, "RISK AGENT");
  rhInfo.appendChild(rhBadge);
  rhInfo.appendChild(div({fontSize:"14px",fontWeight:"700",marginBottom:"3px"}, "Deal Risk Scanner"));
  rhInfo.appendChild(div({fontSize:"11px",color:"#888",lineHeight:"1.5"}, "Scans all open deals for red flags — stalled pipeline, unqualified deals in late stages, and deals at risk of slipping before close."));
  rh2.appendChild(rhInfo);
  var riskResultArea = div({padding:"0 14px 0"});
  riskBox.appendChild(rh2); riskBox.appendChild(riskResultArea);
  var scanBtn = mkBtn("Scan Pipeline for Risks", null, {padding:"8px 16px",borderRadius:"8px",background:"linear-gradient(135deg,#f87171,#f5a623)",border:"none",color:"#fff",fontSize:"11px",fontWeight:"700"});
  rh2.appendChild(div({flexShrink:"0"}, scanBtn));
  scanBtn.addEventListener("click", function(){
    scanBtn.textContent = "Scanning..."; scanBtn.disabled = true;
    riskResultArea.innerHTML = "";
    var risks = [];
    G.contacts.filter(function(c){ return !["Closed Won","Closed Lost"].includes(c.stage); }).forEach(function(c) {
      var flags = [];
      var dis5 = daysInStage(c); var d5 = daysAgo(c.lastContact); var dh5 = dealHealth(c); var bs5 = bantScore(c);
      if (dis5 !== null && dis5 >= 14) flags.push({label:"Stalled "+dis5+"d in "+c.stage,color:"#f87171"});
      if (d5 !== null && d5 >= 10) flags.push({label:"No contact in "+d5+" days",color:"#f5a623"});
      if (bs5 < 2 && ["Meeting Set","Proposal Sent"].includes(c.stage)) flags.push({label:"Low BANT ("+bs5+"/4) in "+c.stage,color:"#f87171"});
      if (dh5 !== null && dh5 < 40) flags.push({label:"Deal health critical: "+dh5+"%",color:"#f87171"});
      var openObjs = (c.objections||[]).filter(function(o){ return !o.resolved; }).length;
      if (openObjs >= 2) flags.push({label:openObjs+" unresolved objections",color:"#f5a623"});
      if (flags.length > 0) risks.push({c:c, flags:flags, severity: flags.filter(function(f){ return f.color==="#f87171"; }).length});
    });
    risks.sort(function(a,b){ return b.severity - a.severity; });
    var rb2 = div({padding:"13px 14px"});
    if (!risks.length) {
      var ok = div({background:"rgba(52,211,153,0.06)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:"9px",padding:"12px",textAlign:"center"});
      ok.appendChild(div({fontSize:"13px",fontWeight:"700",color:"#34d399",marginBottom:"3px"}, "Pipeline looks healthy!"));
      ok.appendChild(div({fontSize:"10px",color:"#888"}, "No critical risk flags detected across open deals."));
      rb2.appendChild(ok);
    } else {
      rb2.appendChild(div({fontSize:"9px",color:"#f87171",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"8px"}, risks.length + " deals at risk"));
      risks.forEach(function(item) {
        var rc = div({background:"#13131a",border:"1px solid rgba(248,113,113,0.2)",borderRadius:"9px",padding:"10px 12px",marginBottom:"6px",cursor:"pointer"});
        rc.className = "row-btn";
        var rcTop = div({display:"flex",alignItems:"center",gap:"9px",marginBottom:"6px"});
        rcTop.appendChild(avatar(item.c.name, COLORS[item.c.stage], 28));
        var rcInfo = div({flex:"1",minWidth:"0"});
        rcInfo.appendChild(div({fontSize:"12px",fontWeight:"700"}, item.c.name));
        rcInfo.appendChild(div({fontSize:"10px",color:"#888"}, item.c.company + " - " + item.c.stage + " - " + fmtVal(item.c.value)));
        rcTop.appendChild(rcInfo);
        rc.appendChild(rcTop);
        var flagsRow = div({display:"flex",gap:"4px",flexWrap:"wrap"});
        item.flags.forEach(function(f){ flagsRow.appendChild(div({fontSize:"9px",fontWeight:"600",color:f.color,background:f.color+"15",border:"1px solid "+f.color+"33",padding:"2px 8px",borderRadius:"100px"}, f.label)); });
        rc.appendChild(flagsRow);
        rc.addEventListener("click", (function(cId){ return function(){ G.selId=cId; G.tab="bant"; render(); }; })(item.c.id));
        rb2.appendChild(rc);
      });
      // AI commentary on biggest risk
      if (risks.length > 0) {
        var worstDeals = risks.slice(0,5).map(function(r){ return r.c.name + " (" + r.flags.map(function(f){ return f.label; }).join(", ") + ")"; }).join("\n");
        callAI(
          "You are a sales coach. In 2-3 sentences, give actionable advice on how to address these pipeline risks. Be direct and specific.",
          "Deals at risk:\n" + worstDeals,
          250
        ).then(function(advice){
          var advBox = div({background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:"8px",padding:"10px 12px",marginTop:"10px"});
          advBox.appendChild(div({fontSize:"9px",color:"#a78bfa",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"4px"}, "AI Coach Advice"));
          advBox.appendChild(div({fontSize:"11px",color:"#ccc",lineHeight:"1.6"}, advice));
          rb2.appendChild(advBox);
        }).catch(function(){});
      }
    }
    riskResultArea.appendChild(rb2);
    scanBtn.textContent = "Re-scan"; scanBtn.disabled = false;
  });
  w.appendChild(riskBox);

  // ── AGENT 3: Email Reply Drafter ──
  var replyBox = div({background:"#0e0f14",border:"1px solid #1a1a24",borderRadius:"12px",overflow:"hidden",marginBottom:"12px"});
  var rplyHdr = div({padding:"13px 14px",borderBottom:"1px solid #1a1a24"});
  var rplyBadge = div({fontSize:"8px",fontWeight:"700",color:"#a78bfa",background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.2)",padding:"2px 8px",borderRadius:"100px",display:"inline-block",marginBottom:"6px"}, "REPLY AGENT");
  rplyHdr.appendChild(rplyBadge);
  rplyHdr.appendChild(div({fontSize:"14px",fontWeight:"700",marginBottom:"3px"}, "Email Reply Drafter"));
  rplyHdr.appendChild(div({fontSize:"11px",color:"#888",lineHeight:"1.5"}, "Paste an inbound email from a prospect. The agent drafts a ready-to-send reply that moves the deal forward."));
  replyBox.appendChild(rplyHdr);
  var rplyBody = div({padding:"13px 14px"});
  // Contact selector
  var rplyContactState = {id: G.selId || ""};
  var contactOpts = [["","No contact selected (generic reply)"]].concat(
    G.contacts.map(function(c){ return [c.id, c.name + " - " + c.company]; })
  );
  rplyBody.appendChild(mkLabel("Contact (optional - personalises the reply)",
    mkSelect(rplyContactState.id, contactOpts, function(v){ rplyContactState.id = v; }, {marginBottom:"8px"})
  ));
  rplyBody.appendChild(div({height:"6px"}));
  var inboundInput = mkTextarea("", function(){}, {minHeight:"90px"});
  inboundInput.placeholder = "Paste the inbound email you received from the prospect...";
  rplyBody.appendChild(mkLabel("Inbound Email", inboundInput));
  rplyBody.appendChild(div({height:"10px"}));
  var draftReplyBtn = mkBtn("Draft Reply", null, {padding:"9px",borderRadius:"8px",background:"linear-gradient(135deg,#a78bfa,#4a9eff)",border:"none",color:"#fff",fontSize:"12px",fontWeight:"700",width:"100%"});
  var replyResultArea = div({});
  draftReplyBtn.addEventListener("click", function(){
    var inbound = inboundInput.value.trim();
    if (!inbound) return;
    draftReplyBtn.textContent = "Drafting..."; draftReplyBtn.disabled = true;
    replyResultArea.innerHTML = "";
    var contact = rplyContactState.id ? G.contacts.find(function(c){ return c.id === rplyContactState.id; }) : null;
    var ctx = contact ? "Contact: " + contact.name + ", " + contact.title + " at " + contact.company + "\nStage: " + contact.stage + "\nBANT: " + bantScore(contact) + "/4\nNotes: " + (contact.notes||"none") + "\n\n" : "";
    callAI(
      "You are an elite B2B sales rep. Draft a concise, compelling reply to this inbound email that moves the conversation forward. Return ONLY JSON: {\"subject\":\"Re: ...\",\"body\":\"email body under 120 words\",\"intent\":\"what this reply is trying to achieve\"}",
      ctx + "Inbound email:\n" + inbound,
      450
    ).then(function(txt){
      var res = JSON.parse(txt);
      var rb3 = div({background:"#13131a",border:"1px solid rgba(167,139,250,0.25)",borderRadius:"10px",overflow:"hidden",marginTop:"10px"});
      var rb3h = div({padding:"7px 10px",borderBottom:"1px solid #1e1e2a",display:"flex",alignItems:"center",justifyContent:"space-between"});
      rb3h.appendChild(div({fontSize:"9px",fontWeight:"700",color:"#a78bfa",textTransform:"uppercase",letterSpacing:"0.07em"}, "Drafted Reply"));
      var cpReply = mkBtn("Copy", function(){
        navigator.clipboard.writeText("Subject: "+res.subject+"\n\n"+res.body);
        cpReply.textContent="Copied!"; setTimeout(function(){cpReply.textContent="Copy";},2000);
      }, {padding:"2px 7px",borderRadius:"4px",background:"#1e1e2a",border:"1px solid #2a2a3a",color:"#aaa",fontSize:"9px",fontWeight:"600"});
      rb3h.appendChild(cpReply); rb3.appendChild(rb3h);
      var rb3b = div({padding:"10px 11px"});
      if (res.intent) {
        rb3b.appendChild(div({fontSize:"9px",color:"#555",fontWeight:"700",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.07em"}, "Intent: " + res.intent));
      }
      rb3b.appendChild(div({fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700",marginBottom:"2px"}, "Subject"));
      rb3b.appendChild(div({fontSize:"11px",fontWeight:"600",fontStyle:"italic",marginBottom:"8px"}, res.subject));
      rb3b.appendChild(div({fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700",marginBottom:"4px"}, "Body"));
      rb3b.appendChild(div({fontSize:"10px",color:"#ccc",lineHeight:"1.75",whiteSpace:"pre-wrap"}, res.body));
      rb3.appendChild(rb3b);
      // Log to contact
      if (contact) {
        var logRow = div({padding:"7px 10px",borderTop:"1px solid #1e1e2a"});
        var logReplyBtn = mkBtn("Log Outbound Reply to " + contact.name, function(){
          updateContact(contact.id, {emails:(contact.emails||[]).concat([{id:"e_"+Date.now(),subject:res.subject,preview:res.body.slice(0,100),date:today(),direction:"out"}]),lastContact:today()});
          logReplyBtn.textContent="Logged!"; logReplyBtn.disabled=true;
        }, {padding:"6px",borderRadius:"6px",background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.25)",color:"#a78bfa",fontSize:"10px",fontWeight:"600",width:"100%"});
        logRow.appendChild(logReplyBtn); rb3.appendChild(logRow);
      }
      replyResultArea.appendChild(rb3);
      draftReplyBtn.textContent = "Draft Reply"; draftReplyBtn.disabled = false;
    }).catch(function(){ draftReplyBtn.textContent = "Draft Reply"; draftReplyBtn.disabled = false; });
  });
  rplyBody.appendChild(draftReplyBtn); rplyBody.appendChild(replyResultArea);
  replyBox.appendChild(rplyBody);
  w.appendChild(replyBox);

  // ── AGENT 4: Sequence Optimizer ──
  var seqOptBox = div({background:"#0e0f14",border:"1px solid #1a1a24",borderRadius:"12px",overflow:"hidden",marginBottom:"12px"});
  var soHdr = div({padding:"13px 14px",borderBottom:"1px solid #1a1a24",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px"});
  var soInfo = div({flex:"1"});
  var soBadge = div({fontSize:"8px",fontWeight:"700",color:"#38bdf8",background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.2)",padding:"2px 8px",borderRadius:"100px",display:"inline-block",marginBottom:"6px"}, "SEQUENCE AGENT");
  soInfo.appendChild(soBadge);
  soInfo.appendChild(div({fontSize:"14px",fontWeight:"700",marginBottom:"3px"}, "Sequence Optimizer"));
  soInfo.appendChild(div({fontSize:"11px",color:"#888",lineHeight:"1.5"}, "Analyses all active sequences across your pipeline. Surfaces contacts where sequences have stalled and suggests how to re-engage."));
  soHdr.appendChild(soInfo);
  var seqResultArea = div({padding:"0 14px 0"});
  seqOptBox.appendChild(soHdr); seqOptBox.appendChild(seqResultArea);
  var optimiseBtn = mkBtn("Analyse Sequences", null, {padding:"8px 16px",borderRadius:"8px",background:"linear-gradient(135deg,#38bdf8,#a78bfa)",border:"none",color:"#fff",fontSize:"11px",fontWeight:"700"});
  soHdr.appendChild(div({flexShrink:"0"}, optimiseBtn));
  optimiseBtn.addEventListener("click", function(){
    optimiseBtn.textContent = "Analysing..."; optimiseBtn.disabled = true;
    seqResultArea.innerHTML = "";
    var seqStats = [];
    G.contacts.forEach(function(c){
      (c.sequences||[]).forEach(function(seq){
        var total = seq.steps.length;
        var sent = seq.steps.filter(function(s){ return s.status==="sent"; }).length;
        var replied = seq.steps.filter(function(s){ return s.status==="replied"; }).length;
        var pending = seq.steps.filter(function(s){ return s.status==="pending"; }).length;
        var overdue = 0;
        if (seq.active) {
          var created = new Date(seq.createdDate + "T00:00:00").getTime();
          seq.steps.forEach(function(step){
            if (step.status==="pending" && Date.now() > created + (step.day-1)*86400000) overdue++;
          });
        }
        seqStats.push({c:c, seq:seq, total:total, sent:sent, replied:replied, pending:pending, overdue:overdue, active:seq.active});
      });
    });
    var active = seqStats.filter(function(s){ return s.active; });
    var rb4 = div({padding:"13px 14px"});
    if (!active.length) {
      rb4.appendChild(div({fontSize:"12px",color:"#666",textAlign:"center",padding:"18px"}, "No active sequences found. Generate sequences from individual contacts."));
    } else {
      rb4.appendChild(div({fontSize:"9px",color:"#888",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"8px"}, active.length + " active sequences"));
      active.forEach(function(item){
        var sc2 = COLORS[item.c.stage];
        var sr = div({background:"#13131a",border:"1px solid "+(item.overdue>0?"rgba(245,166,35,0.3)":"#1e1e2a"),borderRadius:"9px",padding:"10px 12px",marginBottom:"6px",cursor:"pointer"});
        sr.className = "row-btn";
        var srTop = div({display:"flex",alignItems:"center",gap:"9px",marginBottom:"8px"});
        srTop.appendChild(avatar(item.c.name, sc2, 28));
        var srInfo = div({flex:"1",minWidth:"0"});
        srInfo.appendChild(div({fontSize:"12px",fontWeight:"700"}, item.c.name));
        srInfo.appendChild(div({fontSize:"9px",color:"#888"}, item.seq.name + " - " + item.c.company));
        srTop.appendChild(srInfo);
        sr.appendChild(srTop);
        var srStats = div({display:"flex",gap:"5px",flexWrap:"wrap"});
        if (item.sent > 0) srStats.appendChild(div({fontSize:"9px",padding:"2px 7px",borderRadius:"100px",color:"#4a9eff",background:"rgba(74,158,255,0.1)"}, item.sent + " sent"));
        if (item.replied > 0) srStats.appendChild(div({fontSize:"9px",padding:"2px 7px",borderRadius:"100px",color:"#34d399",background:"rgba(52,211,153,0.1)"}, item.replied + " replied"));
        if (item.overdue > 0) srStats.appendChild(div({fontSize:"9px",padding:"2px 7px",borderRadius:"100px",color:"#f5a623",background:"rgba(245,166,35,0.1)",fontWeight:"700"}, item.overdue + " overdue"));
        if (item.pending > 0) srStats.appendChild(div({fontSize:"9px",padding:"2px 7px",borderRadius:"100px",color:"#666",background:"#1e1e2a"}, item.pending + " pending"));
        sr.appendChild(srStats);
        sr.addEventListener("click", (function(cId){ return function(){ G.selId=cId; G.tab="sequence"; render(); }; })(item.c.id));
        rb4.appendChild(sr);
      });
      // AI optimization tips
      var seqSummary = active.map(function(s){ return s.c.name + ": " + s.sent + "/" + s.total + " sent, " + s.replied + " replied, " + s.overdue + " overdue"; }).join("\n");
      callAI(
        "Sales coach. Give 2-3 specific tips to improve these sequences. Return plain text only, no JSON. Be direct.",
        "Active sequences:\n" + seqSummary,
        200
      ).then(function(tips){
        var tipsBox = div({background:"rgba(56,189,248,0.06)",border:"1px solid rgba(56,189,248,0.2)",borderRadius:"8px",padding:"10px 12px",marginTop:"10px"});
        tipsBox.appendChild(div({fontSize:"9px",color:"#38bdf8",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:"5px"}, "Optimisation Tips"));
        tipsBox.appendChild(div({fontSize:"11px",color:"#ccc",lineHeight:"1.7",whiteSpace:"pre-wrap"}, tips));
        rb4.appendChild(tipsBox);
      }).catch(function(){});
    }
    seqResultArea.appendChild(rb4);
    optimiseBtn.textContent = "Re-analyse"; optimiseBtn.disabled = false;
  });
  w.appendChild(seqOptBox);
  return w;
}

function exportCSV() {
  var headers = ["Name","Title","Company","Email","Phone","Stage","Score","Value","Industry","Source","Last Contact","Next Step"];
  var rows = G.contacts.map(function(c) {
    return [
      c.name||"", c.title||"", c.company||"", c.email||"", c.phone||"",
      c.stage||"", SCORE_LABEL[c.score||0], c.value||"",
      c.industry||"", c.source||"", c.lastContact||"", c.nextStep||""
    ].map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; });
  });
  var csv = [headers.join(",")].concat(rows.map(function(r){ return r.join(","); })).join("\n");
  var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "tariq-crm-contacts.csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function render() {
  renderSidebar();
  renderMain();
  renderDrawer();
  renderModal();
}

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================
document.addEventListener("keydown", function(e) {
  var tag = (e.target.tagName||"").toLowerCase();
  if (tag === "input" || tag === "textarea" || tag === "select") return;
  if (e.key === "Escape") {
    if (G.modal) { G.modal = null; document.getElementById("modal").innerHTML = ""; return; }
    if (G.selId) { G.selId = null; render(); return; }
    if (G.dialerActive) { G.dialerActive = false; G.dialerSession = null; render(); return; }
  }
  if (e.key === "?" && !G.modal) { G.modal = "shortcuts"; renderModal(); return; }
  if (e.key === "n" && !G.selId && !G.modal) { G.modal = "addContact"; renderModal(); return; }
  if (G.selId && !G.modal) {
    if (e.key === "e") { G.tab = "ai"; render(); return; }
    if (e.key === "c") { G.modal = "logCall"; renderModal(); return; }
    if (e.key === "t") { G.modal = "addTask"; renderModal(); return; }
    if (e.key === "m") { G.modal = "addMeeting"; renderModal(); return; }
  }
});

init();
</script>
