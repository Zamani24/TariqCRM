version: '3.8'

services:
  # ─── N8N Workflow Automation ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: tariqcrm-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_AUTH_PASSWORD:-changeme}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-a-very-long-random-secret-key-change-me}
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      # Make bridge service URL available to N8N workflows
      - BRIDGE_SERVICE_URL=http://crm-bridge:3001
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev-secret}
      # Optional: SMTP for email workflows
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@yourdomain.com}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
    networks:
      - tariqcrm-net
    depends_on:
      - crm-bridge
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── CRM N8N Bridge Service ─────────────────────────────────────────────────
  crm-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tariqcrm-bridge
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - N8N_BASE_URL=http://n8n:5678
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev-secret}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      - DB_PATH=/app/data/tariqcrm.db
    volumes:
      - bridge_data:/app/data
    networks:
      - tariqcrm-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Static CRM File Server ─────────────────────────────────────────────────
  crm-ui:
    image: nginx:alpine
    container_name: tariqcrm-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tariqcrm-net
    depends_on:
      - crm-bridge

volumes:
  n8n_data:
    driver: local
  bridge_data:
    driver: local

networks:
  tariqcrm-net:
    driver: bridge
